# Get Out Aviation LLC — https://github.com/extremeshannon/getout
# Static site (nginx). Theme: Old Glory (red, white, blue).
#
# Web listens on 0.0.0.0:8004. On VPS open firewall if needed, e.g.:
#   sudo ufw allow 8004/tcp && sudo ufw reload
#
# Local:  http://127.0.0.1:8004/
# Loopback-only: docker compose -f docker-compose.yml -f docker-compose.local.yml up -d --build
#
# Dev:
#   docker compose up -d --build

services:
  web:
    build:
      context: .
      dockerfile: docker/Dockerfile.web
    container_name: getout_web
    ports:
      - "8004:80"
